name: Tests

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  tests:
    name: PHP ${{ matrix.php-versions }} — Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-versions: ['8.2', '8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          tools: composer
          # Only the 8.5 row instruments with Xdebug — every other row runs
          # uninstrumented so the matrix stays fast.
          coverage: ${{ matrix.php-versions == '8.5' && 'xdebug' || 'none' }}

      - name: Get composer cache directory
        id: composercache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composercache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php-versions }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-${{ matrix.php-versions }}-composer-

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Run tests
        run: |
          if [ "${{ matrix.php-versions }}" = "8.5" ]; then
            vendor/bin/phpunit
          else
            vendor/bin/phpunit --no-coverage
          fi

      - name: Upload coverage to Coveralls
        if: matrix.php-versions == '8.5'
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: build/logs/clover.xml
